<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Patient Records</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            padding: 2rem;
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        th, td {
            padding: 0.9rem;
            border: 1px solid #ddd;
            text-align: left;
        }
        th {
            background: #2f6fed;
            color: white;
        }
        a {
            text-decoration: none;
            color: #2f6fed;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <h2>Patient Records</h2>
        <div>
            Logged in as <strong>{{ user }}</strong> |
            <a href="{{ url_for('logout') }}">Logout</a>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Date of Birth</th>
                <th>Diagnosis</th>
                <th>Physician</th>
            </tr>
        </thead>
        <tbody>
            {% for patient in patients %}
            <tr>
                <td>{{ patient.id }}</td>
                <td>{{ patient.first_name }}</td>
                <td>{{ patient.last_name }}</td>
                <td>{{ patient.dob }}</td>
                <td>{{ patient.diagnosis }}</td>
                <td>{{ patient.physician }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
